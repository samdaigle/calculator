<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div>
      <div id="calculator">
        <div id="display"></div>
        <div class="keypad">
          <div class="left">
            <div class="top">
              <button id="clear">C</button>
            </div>
            <div class="mainGrid">
              <div id="numbers">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>0</button>
              </div>
            </div>
          </div>

          <div id="operators">
            <button id="addition">+</button>
            <button id="subtract">-</button>
            <button id="divide">/</button>
            <button id="multiply">*</button>
            <button id="equals">=</button>
          </div>
        </div>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
